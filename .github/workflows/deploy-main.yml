name: Deploy Dev or Staging

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging

concurrency:
  group: cdk-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.stage }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Synth
        env:
          STAGE: ${{ github.event.inputs.stage }}
          CDK_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          VITE_API_URL: "https://${{ github.event.inputs.stage }}.${{ secrets.DOMAIN_NAME }}/api"
        run: npx cdk synth

      - name: Deploy
        env:
          STAGE: ${{ github.event.inputs.stage }}
          CDK_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          VITE_API_URL: "https://${{ github.event.inputs.stage }}.${{ secrets.DOMAIN_NAME }}/api"
        run: npx cdk deploy FrontendStack-staging --require-approval never
